# SAM CLI configuration for Trivia Game v2
version = 0.1

[default.global.parameters]
stack_name = "trivia"
region = "us-west-2"
profile = "demo"

[default.build.parameters]
parallel = true
cached = true

[default.deploy.parameters]
stack_name = "trivia"
region = "us-west-2"
profile = "demo"
resolve_s3 = true
capabilities = "CAPABILITY_IAM"
confirm_changeset = true

[default.validate.parameters]
region = "us-west-2"
profile = "demo"
lint = true

[default.logs.parameters]
region = "us-west-2"
profile = "demo"
stack_name = "trivia"
