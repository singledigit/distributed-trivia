<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Brain/question mark trivia icon -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="48" height="48" rx="12" fill="#0c0a1a"/>
  <circle cx="24" cy="22" r="16" fill="url(#bg)" opacity="0.15"/>
  <text x="24" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="url(#bg)" filter="url(#glow)">?</text>
  <circle cx="24" cy="40" r="2.5" fill="url(#bg)" filter="url(#glow)"/>
</svg>